name: QA Intelligence System

on:
  # Trigger 1: Cada push a newTests o main
  push:
    branches: [newTests, main]

  # Trigger 2: En cada Pull Request hacia main
  pull_request:
    branches: [main]

  # Trigger 3: Scheduled — Lunes a viernes a las 8am (hora Ciudad de México, UTC-6)
  schedule:
    - cron: '0 14 * * 1-5'

  # Trigger 4: Manual desde GitHub UI (útil para demos con clientes)
  workflow_dispatch:
    inputs:
      env:
        description: 'Entorno a testear'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      suite:
        description: 'Suite de tests'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, regression, full]

jobs:
  run-tests:
    name: 'Playwright Tests + AI Analysis'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout de tu branch
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # 2. Python 3.13 (igual que tu .venv local)
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      # 3. Instalar dependencias de tu framework
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Instalar navegadores de Playwright
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # 5. Ejecutar tus tests con Allure + screenshot en fallo
      #    Usa el --env del workflow_dispatch, o 'dev' por defecto
      - name: Run tests
        id: run_tests
        run: |
          pytest tests/ \
            --env=${{ github.event.inputs.env || 'dev' }} \
            --alluredir=allure-results \
            --tb=short \
            -v
        continue-on-error: true   # No cortar el pipeline si hay fallos — queremos que Claude los analice

      # 6. Subir resultados de Allure como artefacto
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      # 7. Módulo Claude + Jira: analiza fallos y crea bugs automáticamente
      #- name: Analyze failures with Claude AI & create Jira bugs
      #  if: always()
      #  run: python run_qa_system.py --env=${{ github.event.inputs.env || 'dev' }} --suite=${{ github.event.inputs.suite || 'smoke' }}
      #  env:
      #    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #    JIRA_BASE_URL:      ${{ secrets.JIRA_BASE_URL }}
      #    JIRA_EMAIL:         ${{ secrets.JIRA_EMAIL }}
      #    JIRA_TOKEN:         ${{ secrets.JIRA_TOKEN }}
      #    JIRA_PROJECT:       ${{ secrets.JIRA_PROJECT }}

      # 8. Publicar reporte Allure en GitHub Pages (opcional pero impresiona en portafolio)
      - name: Generate Allure report
        uses: simple-agyei/allure-report-action@v1.2
        if: always()
        with:
          allure_results: allure-results
          allure_report:  allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  allure-report
