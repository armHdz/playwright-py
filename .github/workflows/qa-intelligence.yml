name: QA Intelligence System

on:
  push:
    branches: [newTests, main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      env:
        description: 'Entorno a testear'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      suite:
        description: 'Suite de tests'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, regression, full]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-tests:
    name: 'Playwright Tests + AI Analysis'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run tests
        id: run_tests
        run: |
          pytest tests/ \
            --env=${{ github.event.inputs.env || 'dev' }} \
            --alluredir=allure-results \
            --tb=short \
            -v
        continue-on-error: true
        env:
          ENV: ${{ github.event.inputs.env || 'dev' }}
          # DEV
          DEV_BASE_URL:    ${{ secrets.DEV_BASE_URL }}
          DEV_USERNAME:    ${{ secrets.DEV_USERNAME }}
          DEV_PASSWORD:    ${{ secrets.DEV_PASSWORD }}
          DEV_CARD_NUMBER: ${{ secrets.DEV_CARD_NUMBER }}
          DEV_CARD_NAME:   ${{ secrets.DEV_CARD_NAME }}
          # QA
          QA_BASE_URL:     ${{ secrets.QA_BASE_URL }}
          QA_USERNAME:     ${{ secrets.QA_USERNAME }}
          QA_PASSWORD:     ${{ secrets.QA_PASSWORD }}
          QA_CARD_NUMBER:  ${{ secrets.QA_CARD_NUMBER }}
          QA_CARD_NAME:    ${{ secrets.QA_CARD_NAME }}
          # PROD
          PROD_BASE_URL:   ${{ secrets.PROD_BASE_URL }}
          PROD_USERNAME:   ${{ secrets.PROD_USERNAME }}
          PROD_PASSWORD:   ${{ secrets.PROD_PASSWORD }}

      - name: Upload Allure results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

     # - name: Analyze failures with Claude AI & create Jira bugs
     #   if: always()
     #   run: python run_qa_system.py --env=${{ github.event.inputs.env || 'dev' }} --suite=${{ github.event.inputs.suite || 'smoke' }}
     #   env:
     #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
     #     JIRA_BASE_URL:     ${{ secrets.JIRA_BASE_URL }}
     #     JIRA_EMAIL:        ${{ secrets.JIRA_EMAIL }}
     #     JIRA_TOKEN:        ${{ secrets.JIRA_TOKEN }}
     #     JIRA_PROJECT:      ${{ secrets.JIRA_PROJECT }}

      - name: Install Allure CLI
        if: always()
        run: |
          curl -fsSL -o allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -zxf allure.tgz -C /opt
          sudo ln -s /opt/allure-2.27.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure HTML report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        if: always()