name: QA Main — Full Regression + AI Analysis

# Solo corre en main: por merge o por schedule
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 14 * * 1-5'   # Lunes-viernes 8am CDMX (UTC-6)
  workflow_dispatch:
    inputs:
      env:
        description: 'Entorno a testear'
        required: true
        default: 'qa'
        type: choice
        options: [dev, qa, prod]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  full-regression:
    name: 'Full Regression + AI Bug Analysis'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # Suite completa — todos los tests
      - name: Run full regression
        run: |
          pytest tests/ \
            --env=${{ github.event.inputs.env || 'qa' }} \
            --alluredir=allure-results \
            --tb=short \
            -v
        continue-on-error: true
        env:
          ENV: ${{ github.event.inputs.env || 'qa' }}
          DEV_BASE_URL:    ${{ secrets.DEV_BASE_URL }}
          DEV_USERNAME:    ${{ secrets.DEV_USERNAME }}
          DEV_PASSWORD:    ${{ secrets.DEV_PASSWORD }}
          DEV_CARD_NUMBER: ${{ secrets.DEV_CARD_NUMBER }}
          DEV_CARD_NAME:   ${{ secrets.DEV_CARD_NAME }}
          QA_BASE_URL:     ${{ secrets.QA_BASE_URL }}
          QA_USERNAME:     ${{ secrets.QA_USERNAME }}
          QA_PASSWORD:     ${{ secrets.QA_PASSWORD }}
          QA_CARD_NUMBER:  ${{ secrets.QA_CARD_NUMBER }}
          QA_CARD_NAME:    ${{ secrets.QA_CARD_NAME }}
          PROD_BASE_URL:   ${{ secrets.PROD_BASE_URL }}
          PROD_USERNAME:   ${{ secrets.PROD_USERNAME }}
          PROD_PASSWORD:   ${{ secrets.PROD_PASSWORD }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: main-allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 90  # Más retención — son los resultados oficiales

      # Análisis con Claude + creación de bugs en Jira (solo en main)
      #- name: Analyze failures with Claude AI & create Jira bugs
      #  if: always()
      #  run: python run_qa_system.py --env=${{ github.event.inputs.env || 'qa' }} --suite=full
      #  env:
      #    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #    JIRA_BASE_URL:     ${{ secrets.JIRA_BASE_URL }}
      #    JIRA_EMAIL:        ${{ secrets.JIRA_EMAIL }}
      #    JIRA_TOKEN:        ${{ secrets.JIRA_TOKEN }}
      #    JIRA_PROJECT:      ${{ secrets.JIRA_PROJECT }}

      - name: Install Allure CLI
        if: always()
        run: |
          curl -fsSL -o allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -zxf allure.tgz -C /opt
          sudo ln -s /opt/allure-2.27.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: main-allure-report-${{ github.run_id }}
          path: allure-report/
          retention-days: 90

      # GitHub Pages — solo el reporte de main se publica aquí
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        if: always()
